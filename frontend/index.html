<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仕華投資管理系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222638;--border:#2e3354;
  --accent:#4f8ef7;--accent2:#6ee7b7;--danger:#f87171;--warn:#fbbf24;
  --text:#e2e8f0;--muted:#8892a4;--font:'Noto Sans TC',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:700;letter-spacing:.05em;color:var(--accent)}
.logo span{color:var(--text);font-weight:300}
.header-date{font-family:var(--mono);font-size:12px;color:var(--muted)}
.container{max-width:1200px;margin:0 auto;padding:28px 24px;width:100%}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.card-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
.tabs{display:flex;gap:4px;margin-bottom:24px}
.tab{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--muted);transition:all .15s}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface2);border-color:var(--border);color:var(--text)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover:not(:disabled){background:#3a7af0}
.btn-success{background:#059669;color:#fff}
.btn-success:hover:not(:disabled){background:#047857}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover:not(:disabled){background:#b91c1c}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover:not(:disabled){color:var(--text);border-color:var(--muted)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:44px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:rgba(79,142,247,.05)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:32px;margin-bottom:10px}
.upload-label{font-size:14px;color:var(--text);margin-bottom:5px}
.upload-hint{font-size:12px;color:var(--muted)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.tag-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.tag-green{background:rgba(110,231,183,.15);color:var(--accent2)}
.tag-orange{background:rgba(251,191,36,.15);color:var(--warn)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:9px 12px;text-align:right;border-bottom:1px solid var(--border)}
th.left{text-align:left}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);text-align:right;font-size:12px}
td.left{text-align:left;font-family:var(--font)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.positive{color:var(--accent2)}
.negative{color:var(--danger)}
/* P&L summary cards */
.pnl-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.pnl-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.pnl-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.pnl-value{font-size:18px;font-weight:700;font-family:var(--mono)}
.pnl-sub{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
/* Fund boxes - 2x2 grid */
.fund-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.fund-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.fund-header{padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.fund-name{font-size:14px;font-weight:700}
.fund-total{font-size:12px;font-family:var(--mono);color:var(--muted)}
.fund-stocks{padding:0}
.stock-row{display:grid;grid-template-columns:1fr auto;padding:12px 16px;border-bottom:1px solid var(--border);gap:8px}
.stock-row:last-child{border-bottom:none}
.stock-row-left{display:flex;flex-direction:column;gap:3px}
.stock-row-code{font-size:12px;font-weight:700;font-family:var(--mono);color:var(--muted)}
.stock-row-name{font-size:13px;font-weight:500}
.stock-row-right{display:flex;flex-direction:column;gap:3px;align-items:flex-end}
.stock-shares{font-size:14px;font-weight:700}
.stock-cost{font-size:12px;color:var(--muted);font-family:var(--mono)}
.stock-amount{font-size:12px;font-family:var(--mono)}
.stock-pnl{font-size:12px;font-family:var(--mono);font-weight:600}
.stock-price{font-size:11px;color:var(--muted)}
.fund-empty{padding:20px 16px;text-align:center;color:var(--muted);font-size:13px}
/* Totals bar */
.totals-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:20px}
.totals-inner{display:grid;grid-template-columns:1fr repeat(4,minmax(0,1fr));gap:8px;font-size:13px;align-items:center}
/* Realized P&L table */
.realized-table{width:100%;border-collapse:collapse;font-size:13px}
.realized-table th{padding:8px 12px;background:var(--surface2);color:var(--muted);font-size:11px;text-transform:uppercase;border:1px solid var(--border);text-align:right}
.realized-table th.left{text-align:left}
.realized-table td{padding:8px 12px;border:1px solid var(--border);text-align:right;font-family:var(--mono)}
.realized-table td.left{text-align:left;font-family:var(--font)}
.realized-table tr.total-row td{background:var(--surface2);font-weight:700}
/* Toolbar */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.toolbar-left{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
select.filter-select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-family:var(--font);font-size:13px}
.warning-box{background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--warn);margin-bottom:14px}
.meta-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.meta-item{font-size:13px}
.meta-item label{color:var(--muted);margin-right:6px}
.meta-item strong{font-family:var(--mono)}
.name-input{background:var(--surface2);border:1px solid var(--accent);border-radius:6px;color:var(--text);font-family:var(--font);font-size:13px;padding:4px 8px;width:150px}
.edit-input{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--mono);font-size:12px;padding:3px 6px;text-align:right;width:90px}
.edit-input:focus{outline:none;border-color:var(--accent)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:480px;max-width:95vw}
.modal-title{font-size:15px;font-weight:700;margin-bottom:18px}
.modal-field{margin-bottom:14px}
.modal-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.modal-field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:8px 10px}
.modal-field input:focus{outline:none;border-color:var(--accent)}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:44px;color:var(--muted);font-size:14px}
#toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:9999}
.toast{padding:12px 18px;border-radius:8px;font-size:13px;font-weight:500;animation:slideIn .2s ease;max-width:360px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.toast-success{background:#065f46;color:#d1fae5;border:1px solid #059669}
.toast-error{background:#7f1d1d;color:#fee2e2;border:1px solid #dc2626}
.toast-info{background:#1e3a5f;color:#bfdbfe;border:1px solid #3b82f6}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>
<header>
  <div class="logo">仕華 <span>投資管理系統</span></div>
  <div class="header-date" id="header-date"></div>
</header>
<div class="container">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('holdings')">📊 庫存總表</div>
    <div class="tab" onclick="switchTab('upload')">📄 上傳交易</div>
    <div class="tab" onclick="switchTab('history')">📋 交易記錄</div>
  </div>

  <!-- ── Tab: Holdings ── -->
  <div class="tab-panel active" id="tab-holdings">
    <div class="toolbar">
      <div style="font-size:13px;color:var(--muted)" id="price-status">市價尚未更新</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" onclick="updatePrices()"><span id="price-btn-text">🔄 更新市價</span></button>
        <button class="btn btn-success" onclick="exportExcel()">⬇ 匯出 Excel</button>
      </div>
    </div>

    <!-- P&L Summary Cards -->
    <div class="pnl-grid" id="pnl-grid">
      <div class="empty-state" style="grid-column:1/-1;padding:20px">載入中...</div>
    </div>

    <!-- 4 Fund Boxes -->
    <div class="fund-grid" id="fund-grid"></div>

    <!-- Totals Bar -->
    <div class="totals-bar" id="totals-bar" style="display:none">
      <div class="totals-inner">
        <div style="font-weight:700;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em">小計（金額）</div>
        <div id="total-rc"  style="text-align:right;font-family:var(--mono);font-weight:700"></div>
        <div id="total-hq"  style="text-align:right;font-family:var(--mono);font-weight:700"></div>
        <div id="total-prc" style="text-align:right;font-family:var(--mono);font-weight:700"></div>
        <div id="total-phq" style="text-align:right;font-family:var(--mono);font-weight:700"></div>
      </div>
      <!-- Column labels -->
      <div class="totals-inner" style="margin-top:4px">
        <div></div>
        <div style="text-align:right;font-size:11px;color:var(--muted)">RC</div>
        <div style="text-align:right;font-size:11px;color:var(--muted)">華強</div>
        <div style="text-align:right;font-size:11px;color:var(--muted)">私RC</div>
        <div style="text-align:right;font-size:11px;color:var(--muted)">私強</div>
      </div>
    </div>

    <!-- 損益概覽 (bottom) -->
    <div class="card" id="realized-section" style="display:none">
      <div class="card-title">損益概覽</div>
      <table class="realized-table" id="realized-table"></table>
    </div>
  </div>

  <!-- ── Tab: Upload ── -->
  <div class="tab-panel" id="tab-upload">
    <div class="card">
      <div class="card-title">上傳交易 PDF</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".pdf" onchange="handleFileSelect(this)">
        <div class="upload-icon">📂</div>
        <div class="upload-label">拖曳或點擊選擇 PDF</div>
        <div class="upload-hint">支援：國泰、統一、元大　每次一個檔案</div>
      </div>
    </div>
    <div class="card" id="preview-card" style="display:none">
      <div class="card-title">交易預覽　請確認後儲存</div>
      <div class="meta-row" id="meta-row"></div>
      <div id="entity-tag" style="margin-bottom:14px"></div>
      <div id="warnings-box" style="display:none" class="warning-box"></div>
      <table>
        <thead><tr>
          <th class="left">代號</th><th class="left">名稱</th><th class="left">買/賣</th>
          <th>股數</th><th>單價</th><th>成交金額</th><th>手續費</th><th>交易稅</th><th>淨收付</th>
          <th class="left">操作</th>
        </tr></thead>
        <tbody id="preview-body"></tbody>
      </table>
      <div class="btn-row">
        <button class="btn btn-success" onclick="confirmUpload()">✅ 確認儲存</button>
        <button class="btn btn-ghost" onclick="cancelUpload()">✗ 取消</button>
      </div>
    </div>
  </div>

  <!-- ── Tab: History ── -->
  <div class="tab-panel" id="tab-history">
    <div class="toolbar">
      <div class="toolbar-left">
        <select id="filter-entity" class="filter-select" onchange="loadHistory()">
          <option value="">全部帳戶</option>
          <option>RC</option><option>華強</option><option>私銀RC</option><option>私銀華強</option>
        </select>
        <select id="filter-broker" class="filter-select" onchange="loadHistory()">
          <option value="">全部券商</option>
          <option>統一</option><option>元大</option><option>國泰</option>
        </select>
        <select id="filter-month" class="filter-select" onchange="applyMonthFilter()">
          <option value="">全部月份</option>
        </select>
        <button class="btn btn-success btn-sm" onclick="exportHistory()">⬇ 匯出記錄</button>
      </div>
      <div style="font-size:12px;color:var(--muted)" id="history-count"></div>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <table>
        <thead><tr>
          <th class="left">日期</th><th class="left">帳戶</th><th class="left">券商</th>
          <th class="left">代號</th><th class="left">名稱</th>
          <th>股數</th><th>單價</th><th>成交金額</th><th>淨收付</th>
          <th class="left">操作</th>
        </tr></thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">編輯交易記錄</div>
    <input type="hidden" id="edit-txn-id">
    <div class="modal-row">
      <div class="modal-field"><label>交易日期</label><input type="date" id="edit-date"></div>
      <div class="modal-field"><label>股票代號</label><input type="text" id="edit-code"></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>股票名稱</label><input type="text" id="edit-name"></div>
      <div class="modal-field"><label>股數（負數=賣出）</label><input type="number" id="edit-shares"></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>單價</label><input type="number" step="0.01" id="edit-price"></div>
      <div class="modal-field"><label>成交金額</label><input type="number" id="edit-gross"></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>手續費</label><input type="number" id="edit-fee"></div>
      <div class="modal-field"><label>交易稅</label><input type="number" id="edit-tax"></div>
    </div>
    <div class="modal-field"><label>淨收付</label><input type="number" id="edit-net"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditModal()">取消</button>
      <button class="btn btn-success" onclick="saveEdit()">✅ 儲存</button>
    </div>
  </div>
</div>
<div id="toast-container"></div>

<script>
const API = '';
let pendingUpload = null;
let allHistoryTxns = [];
const ENTITIES = ['RC','華強','私銀RC','私銀華強'];

document.getElementById('header-date').textContent =
  new Date().toLocaleDateString('zh-TW',{year:'numeric',month:'long',day:'numeric',weekday:'short'});

function switchTab(name) {
  const names = ['holdings','upload','history'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='holdings') loadHoldings();
  if(name==='history')  loadHistory();
}

// ── Holdings ──────────────────────────────────────────────────────────────────
async function loadHoldings() {
  const [posRes, pnlRes] = await Promise.all([
    fetch(`${API}/api/positions`),
    fetch(`${API}/api/realized_pnl`),
  ]);
  const positions   = await posRes.json();
  const realizedPnl = await pnlRes.json();
  renderHoldings(positions, realizedPnl);
}

function renderHoldings(data, realized) {
  const labels = {'RC':'RC (元大+統一)','華強':'華強 (元大+統一)','私銀RC':'私RC (國泰)','私銀華強':'私強 (國泰)'};

  // ── P&L summary cards ──
  const pnlGrid = document.getElementById('pnl-grid');
  pnlGrid.innerHTML = '';
  ENTITIES.forEach(ent => {
    const positions  = data[ent] || [];
    const unrealized = positions.reduce((s,p) => s+(p.unrealized_pnl||0), 0);
    const real       = realized[ent] || 0;
    const hasPx      = positions.some(p => p.last_price);
    pnlGrid.innerHTML += `
      <div class="pnl-card">
        <div class="pnl-label">${labels[ent]}</div>
        <div class="pnl-value ${unrealized>=0?'positive':'negative'}">${hasPx?fmtPnl(Math.round(unrealized)):'-'}</div>
        <div class="pnl-sub">未實現 ${hasPx?fmtPnl(Math.round(unrealized)):'-'}</div>
        <div class="pnl-sub">已實現 ${fmtPnl(Math.round(real))}</div>
      </div>`;
  });

  // ── 4 Fund boxes ──
  const fundGrid = document.getElementById('fund-grid');
  fundGrid.innerHTML = '';
  const totals = {};

  ENTITIES.forEach(ent => {
    const positions = data[ent] || [];
    const totalAmt  = positions.reduce((s,p) => s+(p.total_cost||0), 0);
    totals[ent] = totalAmt;

    let stocksHtml = '';
    if(!positions.length) {
      stocksHtml = `<div class="fund-empty">目前無持倉</div>`;
    } else {
      positions.forEach(p => {
        const pnl = p.unrealized_pnl;
        stocksHtml += `
          <div class="stock-row">
            <div class="stock-row-left">
              <div class="stock-row-code">${p.security_code}</div>
              <div class="stock-row-name">${p.security_name}</div>
              <div class="stock-price">市價 ${p.last_price??'—'}</div>
            </div>
            <div class="stock-row-right">
              <div class="stock-shares">${Math.round(p.shares/1000)} 張</div>
              <div class="stock-cost">@ ${p.avg_cost?.toFixed(2)??'—'}</div>
              <div class="stock-amount">${p.total_cost?fmt(Math.round(p.total_cost)):'—'}</div>
              <div class="stock-pnl ${pnl==null?'':(pnl>=0?'positive':'negative')}">
                ${pnl!=null?(pnl>=0?'+':'')+fmt(Math.round(pnl)):'—'}
              </div>
            </div>
          </div>`;
      });
    }

    const totalPnl = positions.reduce((s,p) => s+(p.unrealized_pnl||0), 0);
    const hasPx    = positions.some(p => p.last_price);
    fundGrid.innerHTML += `
      <div class="fund-block">
        <div class="fund-header">
          <div class="fund-name">${ent}</div>
          <div class="fund-total">
            ${hasPx ? `損益 <span class="${totalPnl>=0?'positive':'negative'}">${fmtPnl(Math.round(totalPnl))}</span>` : ''}
          </div>
        </div>
        <div class="fund-stocks">${stocksHtml}</div>
      </div>`;
  });

  // Totals bar
  const bar = document.getElementById('totals-bar');
  bar.style.display = 'block';
  document.getElementById('total-rc').textContent  = fmt(Math.round(totals['RC']||0));
  document.getElementById('total-hq').textContent  = fmt(Math.round(totals['華強']||0));
  document.getElementById('total-prc').textContent = fmt(Math.round(totals['私銀RC']||0));
  document.getElementById('total-phq').textContent = fmt(Math.round(totals['私銀華強']||0));

  // ── 損益概覽 (bottom) ──
  const realizedSection = document.getElementById('realized-section');
  const realizedTable   = document.getElementById('realized-table');
  realizedSection.style.display = 'block';

  const hasPx = ENTITIES.some(e => (data[e]||[]).some(p=>p.last_price));
  const uRC=Math.round((data['RC']||[]).reduce((s,p)=>s+(p.unrealized_pnl||0),0));
  const uHQ=Math.round((data['華強']||[]).reduce((s,p)=>s+(p.unrealized_pnl||0),0));
  const uPRC=Math.round((data['私銀RC']||[]).reduce((s,p)=>s+(p.unrealized_pnl||0),0));
  const uPHQ=Math.round((data['私銀華強']||[]).reduce((s,p)=>s+(p.unrealized_pnl||0),0));
  const rRC=Math.round(realized['RC']||0), rHQ=Math.round(realized['華強']||0);
  const rPRC=Math.round(realized['私銀RC']||0), rPHQ=Math.round(realized['私銀華強']||0);

  const pnlRow = (label, rc, hq, prc, phq, cls='') => `<tr class="${cls}">
    <td class="left">${label}</td>
    <td class="${rc>=0?'positive':'negative'}">${fmt(rc)}</td>
    <td class="${hq>=0?'positive':'negative'}">${fmt(hq)}</td>
    <td class="${prc>=0?'positive':'negative'}">${hasPx?fmt(prc):'-'}</td>
    <td class="${phq>=0?'positive':'negative'}">${hasPx?fmt(phq):'-'}</td>
    <td class="${(rc+prc)>=0?'positive':'negative'}">${hasPx?fmt(rc+prc):'-'}</td>
    <td class="${(hq+phq)>=0?'positive':'negative'}">${hasPx?fmt(hq+phq):'-'}</td>
  </tr>`;

  realizedTable.innerHTML = `
    <thead>
      <tr><th class="left" rowspan="2">損益</th><th colspan="2">元大+統一</th><th colspan="2">私銀(國泰)</th><th colspan="2">合計</th></tr>
      <tr><th>RC</th><th>華強</th><th>RC</th><th>華強</th><th>RC</th><th>華強</th></tr>
    </thead>
    <tbody>
      ${pnlRow('已實現損益', rRC, rHQ, rPRC, rPHQ)}
      ${pnlRow('未實現損益', uRC, uHQ, uPRC, uPHQ)}
      ${pnlRow('合計', rRC+uRC, rHQ+uHQ, rPRC+uPRC, rPHQ+uPHQ, 'total-row')}
    </tbody>`;
}

async function updatePrices() {
  const btn = document.getElementById('price-btn-text');
  btn.innerHTML = '<span class="spinner"></span> 更新中...';
  try {
    const res  = await fetch(`${API}/api/prices/update`,{method:'POST'});
    const data = await res.json();
    toast(`✅ 更新 ${data.updated} 檔，失敗 ${data.failed} 檔`, data.failed>0?'info':'success');
    document.getElementById('price-status').textContent = `市價更新：${new Date().toLocaleTimeString('zh-TW')}`;
    loadHoldings();
  } catch(e){ toast('更新失敗','error'); }
  finally { btn.textContent='🔄 更新市價'; }
}
function exportExcel(){ window.location=`${API}/api/export`; toast('📥 下載中...','info'); }

// ── Upload ────────────────────────────────────────────────────────────────────
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over')});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
zone.addEventListener('drop',e=>{
  e.preventDefault();zone.classList.remove('drag-over');
  const f=e.dataTransfer.files[0];
  if(f&&f.name.endsWith('.pdf')) uploadFile(f);
  else toast('請選擇 PDF 檔案','error');
});
function handleFileSelect(input){if(input.files[0])uploadFile(input.files[0])}

async function uploadFile(file) {
  zone.querySelector('.upload-label').textContent=`解析中：${file.name}`;
  zone.querySelector('.upload-icon').innerHTML='<div class="spinner"></div>';
  const formData=new FormData(); formData.append('file',file);
  try {
    const res=await fetch(`${API}/api/upload`,{method:'POST',body:formData});
    const data=await res.json();
    if(!res.ok){toast(data.error||'上傳失敗','error');resetUploadZone();return;}
    pendingUpload={...data,filename:file.name};
    showPreview(data);
  } catch(e){toast('連線失敗','error');resetUploadZone();}
}
function resetUploadZone(){
  zone.querySelector('.upload-label').textContent='拖曳或點擊選擇 PDF';
  zone.querySelector('.upload-icon').textContent='📂';
  document.getElementById('file-input').value='';
}
function showPreview(data) {
  document.getElementById('preview-card').style.display='block';
  resetUploadZone();
  document.getElementById('meta-row').innerHTML=`
    <div class="meta-item"><label>帳號</label><strong>${data.account_no}</strong></div>
    <div class="meta-item"><label>券商</label><strong>${data.broker}</strong></div>
    <div class="meta-item"><label>交易日</label><strong>${data.trade_date}</strong></div>
    ${data.settle_date?`<div class="meta-item"><label>交割日</label><strong>${data.settle_date}</strong></div>`:''}`;
  document.getElementById('entity-tag').innerHTML=`<span class="tag tag-blue">${data.entity}</span>`;
  const warnBox=document.getElementById('warnings-box');
  if(data.warnings?.length||data.unknown_codes?.length){
    let msg='';
    if(data.unknown_codes?.length) msg+=`⚠ 未知代號：${data.unknown_codes.join(', ')}<br>`;
    data.warnings?.forEach(w=>msg+=`⚠ ${w}<br>`);
    warnBox.innerHTML=msg; warnBox.style.display='block';
  } else warnBox.style.display='none';
  renderPreviewTable(data.trades);
}
function renderPreviewTable(trades) {
  const tbody=document.getElementById('preview-body');
  tbody.innerHTML='';
  trades.forEach((t,i)=>{
    const isBuy=t.shares>0;
    if(t._editing) {
      tbody.innerHTML+=`<tr>
        <td class="left"><input class="edit-input" style="width:80px" id="pr-code-${i}" value="${t.security_code}"></td>
        <td class="left"><input class="name-input" id="pr-name-${i}" value="${t.security_name}"></td>
        <td class="left"><select class="filter-select" id="pr-dir-${i}" style="padding:4px 8px;font-size:12px">
          <option value="1" ${isBuy?'selected':''}>買入</option>
          <option value="-1" ${!isBuy?'selected':''}>賣出</option>
        </select></td>
        <td><input class="edit-input" id="pr-shares-${i}" value="${Math.abs(t.shares)}"></td>
        <td><input class="edit-input" id="pr-price-${i}" value="${t.price}"></td>
        <td><input class="edit-input" id="pr-gross-${i}" value="${t.gross_amount}"></td>
        <td><input class="edit-input" id="pr-fee-${i}" value="${t.fee}"></td>
        <td><input class="edit-input" id="pr-tax-${i}" value="${t.tax}"></td>
        <td><input class="edit-input" id="pr-net-${i}" value="${t.net_amount}"></td>
        <td class="left" style="white-space:nowrap">
          <button class="btn btn-success btn-sm" onclick="savePreviewEdit(${i})">✓</button>
          <button class="btn btn-ghost btn-sm" onclick="cancelPreviewEdit(${i})" style="margin-left:4px">✗</button>
        </td>
      </tr>`;
    } else {
      const nameCell=t.name_confirmed?t.security_name:
        `<input class="name-input" id="name-${i}" value="${t.security_name}" placeholder="請輸入名稱">`;
      tbody.innerHTML+=`<tr>
        <td class="left">${t.security_code}</td>
        <td class="left">${nameCell}</td>
        <td class="left"><span class="tag ${isBuy?'tag-green':'tag-orange'}">${isBuy?'買入':'賣出'}</span></td>
        <td>${Math.abs(t.shares).toLocaleString()}</td>
        <td>${t.price.toLocaleString()}</td>
        <td>${t.gross_amount.toLocaleString()}</td>
        <td>${t.fee.toLocaleString()}</td>
        <td>${t.tax.toLocaleString()}</td>
        <td class="${isBuy?'negative':'positive'}">${t.net_amount.toLocaleString()}</td>
        <td class="left" style="white-space:nowrap">
          <button class="btn btn-ghost btn-sm" onclick="editPreviewRow(${i})">✏</button>
          <button class="btn btn-danger btn-sm" onclick="deletePreviewRow(${i})" style="margin-left:4px">🗑</button>
        </td>
      </tr>`;
    }
  });
}
function editPreviewRow(i){
  const ni=document.getElementById(`name-${i}`);
  if(ni) pendingUpload.trades[i].security_name=ni.value;
  pendingUpload.trades[i]._editing=true; renderPreviewTable(pendingUpload.trades);
}
function savePreviewEdit(i){
  const dir=parseInt(document.getElementById(`pr-dir-${i}`).value);
  pendingUpload.trades[i]={...pendingUpload.trades[i],
    security_code:document.getElementById(`pr-code-${i}`).value,
    security_name:document.getElementById(`pr-name-${i}`).value,
    shares:parseFloat(document.getElementById(`pr-shares-${i}`).value)*dir,
    price:parseFloat(document.getElementById(`pr-price-${i}`).value),
    gross_amount:parseFloat(document.getElementById(`pr-gross-${i}`).value),
    fee:parseFloat(document.getElementById(`pr-fee-${i}`).value),
    tax:parseFloat(document.getElementById(`pr-tax-${i}`).value),
    net_amount:parseFloat(document.getElementById(`pr-net-${i}`).value),
    name_confirmed:true,_editing:false};
  renderPreviewTable(pendingUpload.trades);
}
function cancelPreviewEdit(i){pendingUpload.trades[i]._editing=false;renderPreviewTable(pendingUpload.trades);}
function deletePreviewRow(i){pendingUpload.trades.splice(i,1);renderPreviewTable(pendingUpload.trades);toast('已刪除該筆交易','info');}
async function confirmUpload(){
  if(!pendingUpload) return;
  pendingUpload.trades.forEach((t,i)=>{const inp=document.getElementById(`name-${i}`);if(inp)t.security_name=inp.value.trim();});
  try{
    const res=await fetch(`${API}/api/confirm`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(pendingUpload)});
    const data=await res.json();
    if(res.ok){toast(`✅ ${data.message}`,'success');document.getElementById('preview-card').style.display='none';pendingUpload=null;}
    else toast(data.error||'儲存失敗','error');
  }catch(e){toast('連線失敗','error');}
}
function cancelUpload(){document.getElementById('preview-card').style.display='none';pendingUpload=null;}

// ── History ───────────────────────────────────────────────────────────────────
async function loadHistory(){
  const entity=document.getElementById('filter-entity').value;
  const broker=document.getElementById('filter-broker').value;
  let url=`${API}/api/transactions?limit=500`;
  if(entity) url+=`&entity=${encodeURIComponent(entity)}`;
  if(broker) url+=`&broker=${encodeURIComponent(broker)}`;
  const res=await fetch(url);
  allHistoryTxns=await res.json();
  const monthSel=document.getElementById('filter-month');
  const months=[...new Set(allHistoryTxns.map(t=>t.trade_date.slice(0,7)))].sort().reverse();
  const curVal=monthSel.value;
  monthSel.innerHTML='<option value="">全部月份</option>';
  months.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;if(m===curVal)o.selected=true;monthSel.appendChild(o);});
  applyMonthFilter();
}
function applyMonthFilter(){
  const month=document.getElementById('filter-month').value;
  const txns=month?allHistoryTxns.filter(t=>t.trade_date.startsWith(month)):allHistoryTxns;
  document.getElementById('history-count').textContent=`共 ${txns.length} 筆`;
  renderHistoryTable(txns);
}
function renderHistoryTable(txns){
  const tbody=document.getElementById('history-body');
  if(!txns.length){tbody.innerHTML='<tr><td colspan="10" style="text-align:center;color:var(--muted);padding:32px">無記錄</td></tr>';return;}
  tbody.innerHTML=txns.map(t=>{
    const isBuy=t.shares>0;
    return `<tr>
      <td class="left">${t.trade_date}</td><td class="left">${t.entity}</td><td class="left">${t.broker}</td>
      <td class="left">${t.security_code||''}</td><td class="left">${t.security_name||''}</td>
      <td class="${isBuy?'positive':'negative'}">${Math.abs(t.shares).toLocaleString()}</td>
      <td>${t.price?.toLocaleString()??'-'}</td><td>${t.gross_amount?.toLocaleString()??'-'}</td>
      <td class="${isBuy?'negative':'positive'}">${t.net_amount?.toLocaleString()??'-'}</td>
      <td class="left" style="white-space:nowrap">
        <button class="btn btn-ghost btn-sm" onclick="openEditModal(${t.id})">✏</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTxn(${t.id},'${t.security_code}','${t.trade_date}')" style="margin-left:4px">🗑</button>
      </td>
    </tr>`;
  }).join('');
}

// ── Edit Modal ────────────────────────────────────────────────────────────────
function openEditModal(id){
  const t=allHistoryTxns.find(x=>x.id===id); if(!t) return;
  document.getElementById('edit-txn-id').value=id;
  document.getElementById('edit-date').value=t.trade_date;
  document.getElementById('edit-code').value=t.security_code||'';
  document.getElementById('edit-name').value=t.security_name||'';
  document.getElementById('edit-shares').value=t.shares;
  document.getElementById('edit-price').value=t.price;
  document.getElementById('edit-gross').value=t.gross_amount;
  document.getElementById('edit-fee').value=t.fee;
  document.getElementById('edit-tax').value=t.tax;
  document.getElementById('edit-net').value=t.net_amount;
  document.getElementById('edit-modal').style.display='flex';
}
function closeEditModal(){document.getElementById('edit-modal').style.display='none';}
function closeModal(e){if(e.target.id==='edit-modal')closeEditModal();}
async function saveEdit(){
  const id=document.getElementById('edit-txn-id').value;
  const payload={
    trade_date:document.getElementById('edit-date').value,
    security_code:document.getElementById('edit-code').value,
    security_name:document.getElementById('edit-name').value,
    shares:parseFloat(document.getElementById('edit-shares').value),
    price:parseFloat(document.getElementById('edit-price').value),
    gross_amount:parseFloat(document.getElementById('edit-gross').value),
    fee:parseFloat(document.getElementById('edit-fee').value),
    tax:parseFloat(document.getElementById('edit-tax').value),
    net_amount:parseFloat(document.getElementById('edit-net').value),
  };
  try{
    const res=await fetch(`${API}/api/transactions/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(res.ok){toast('✅ 已更新','success');closeEditModal();loadHistory();loadHoldings();}
    else toast('更新失敗','error');
  }catch(e){toast('連線失敗','error');}
}
async function deleteTxn(id,code,dt){
  if(!confirm(`確定刪除 ${code} 在 ${dt} 的交易記錄？`)) return;
  try{
    const res=await fetch(`${API}/api/transactions/${id}`,{method:'DELETE'});
    if(res.ok){toast('✅ 已刪除','success');loadHistory();loadHoldings();}
    else toast('刪除失敗','error');
  }catch(e){toast('連線失敗','error');}
}
async function exportHistory(){
  const entity=document.getElementById('filter-entity').value;
  const broker=document.getElementById('filter-broker').value;
  let url=`${API}/api/transactions/export?limit=9999`;
  if(entity) url+=`&entity=${encodeURIComponent(entity)}`;
  if(broker) url+=`&broker=${encodeURIComponent(broker)}`;
  window.location=url; toast('📥 下載中...','info');
}

function fmt(n){return n==null?'-':n.toLocaleString();}
function fmtPnl(n){if(n==null)return '-';return (n>=0?'+':'')+n.toLocaleString();}
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),4000);
}
loadHoldings();
</script>
